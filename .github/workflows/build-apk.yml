name: Build APK - Armin Arabic-Armenian

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Replace Capacitor Config (ts → json)
        run: |
          rm -f capacitor.config.ts
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.armin.arabic.armenian",
            "appName": "Armin",
            "webDir": "dist",
            "server": {
              "androidScheme": "https",
              "allowNavigation": ["*"]
            }
          }
          CAPEOF

      - name: Build Web Project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Remove existing Android platform
        run: rm -rf android

      - name: Add Android Platform
        run: npx cap add android

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Set Java 17 in Gradle Properties
        run: |
          echo "org.gradle.java.home=${JAVA_HOME}" >> android/gradle.properties

      - name: Inject Android Permissions
        run: |
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Fix Armenian strings
        run: |
          mkdir -p android/app/src/main/res/values-hy
          cat > android/app/src/main/res/values-hy/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Արմին</string>
              <string name="title_activity_main">Արմին</string>
              <string name="package_name">com.armin.arabic.armenian</string>
              <string name="custom_url_scheme">com.armin.arabic.armenian</string>
              <string name="permgrouplab_microphone">Խոսափող</string>
              <string name="permgroupdesc_microphone">ձայնագրման համար</string>
              <string name="perm_label_record_audio">Ձայնագրում</string>
              <string name="perm_desc_record_audio">Հավելվածը կարող է ձայնագրել ձեր խոսքը արտասանության ստուգման համար</string>
              <string name="capacitor_ready_title">Պատրաստ է!</string>
              <string name="capacitor_features_title">Ձայնի կարգավորում</string>
              <string name="capacitor_tts_label">Ձայնային ընթերցում (TTS)</string>
              <string name="capacitor_mic_label">Խոսափող (արտասանության համար)</string>
              <string name="capacitor_start_button">Սկսել սովորել</string>
          </resources>
          STREOF

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      - name: Assemble Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armin-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30