name: Build APK - Armin Arabic-Armenian

on:
  push:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      # Cette étape est indispensable pour que import.meta.env.VITE_GEMINI_API_KEY fonctionne
      - name: Create .env file for Vite
        run: |
          echo "VITE_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Add Android Platform
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Set Java 17 Compatibility
        run: |
          echo "org.gradle.java.home=${JAVA_HOME}" >> android/gradle.properties
          sed -i 's/targetCompatibility = .*/targetCompatibility = JavaVersion.VERSION_17/' android/app/build.gradle
          sed -i 's/sourceCompatibility = .*/sourceCompatibility = JavaVersion.VERSION_17/' android/app/build.gradle

      - name: Fix Android Manifest
        run: |
          # Nettoyage et injection des permissions micro
          sed -i '/android.permission.INTERNET/d' android/app/src/main/AndroidManifest.xml
          sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml

      - name: Fix Strings Resources
        run: |
          # Valeurs par défaut
          cat > android/app/src/main/res/values/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Armin</string>
              <string name="title_activity_main">Armin</string>
              <string name="package_name">com.armin.arabic.armenian</string>
              <string name="custom_url_scheme">com.armin.arabic.armenian</string>
              <string name="permgrouplab_microphone">Microphone</string>
              <string name="permgroupdesc_microphone">For voice recording</string>
              <string name="perm_label_record_audio">Record Audio</string>
              <string name="perm_desc_record_audio">The app needs microphone access for pronunciation check.</string>
              <string name="capacitor_ready_title">Ready!</string>
              <string name="capacitor_features_title">Audio Setup</string>
              <string name="capacitor_tts_label">TTS Reading</string>
              <string name="capacitor_mic_label">Microphone</string>
              <string name="capacitor_start_button">Start</string>
          </resources>
          STREOF
          # Valeurs Arméniennes
          mkdir -p android/app/src/main/res/values-hy
          cat > android/app/src/main/res/values-hy/strings.xml << 'STREOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">Արմին</string>
              <string name="title_activity_main">Արմին</string>
              <string name="permgrouplab_microphone">Խոսափող</string>
              <string name="permgroupdesc_microphone">ձայնագրման համար</string>
              <string name="perm_label_record_audio">Ձայնագրում</string>
              <string name="perm_desc_record_audio">Հավելվածը կարող է ձայնագրել ձեր խոսքը արտասանության ստուգման համար</string>
              <string name="capacitor_ready_title">Պատրաստ է!</string>
              <string name="capacitor_features_title">Ձայնի կարգավորում</string>
              <string name="capacitor_tts_label">Ձայնային ընթերցում (TTS)</string>
              <string name="capacitor_mic_label">Խոսափող (արտասանության համար)</string>
              <string name="capacitor_start_button">Սկսել սովորել</string>
          </resources>
          STREOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armin-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk