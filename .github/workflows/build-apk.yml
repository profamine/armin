name: Build APK - Armin Arabic-Armenian

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────
      - name: Checkout Source
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # ── 3. Install project deps + Capacitor ──────────────────────
      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      # ── 4. Create capacitor.config.json ──────────────────────────
      #    (المشروع لا يحتوي على capacitor.config مسبقاً)
      - name: Create Capacitor Config
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.armin.arabic.armenian",
            "appName": "Armin",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

      # ── 5. Build Vite web app ────────────────────────────────────
      - name: Build Web Project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      # ── 6. Java ──────────────────────────────────────────────────
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # ── 7. Init + Add Android platform ───────────────────────────
      - name: Init Capacitor & Add Android
        run: |
          npx cap init "Armin" "com.armin.arabic.armenian" --web-dir dist
          npx cap add android

      # ── 8. Copy web build into Android ───────────────────────────
      - name: Capacitor Sync
        run: npx cap sync android

      # ── 9. Fix Gradle permissions ─────────────────────────────────
      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      # ── 10. Build Debug APK ───────────────────────────────────────
      - name: Assemble Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # ── 11. Upload APK as artifact ────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armin-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30