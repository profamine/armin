name: Build APK - Armin Arabic-Armenian

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/cli

      - name: Replace Capacitor Config (ts → json)
        run: |
          rm -f capacitor.config.ts
          cat > capacitor.config.json << 'CAPEOF'
          {
            "appId": "com.armin.arabic.armenian",
            "appName": "Armin",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            }
          }
          CAPEOF

      - name: Build Web Project
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # حذف android/ القديم ثم إعادة إضافته نظيفاً
      - name: Remove existing Android platform
        run: rm -rf android

      - name: Add Android Platform
        run: npx cap add android

      - name: Capacitor Sync
        run: npx cap sync android

      - name: Fix Gradle Permissions
        run: chmod +x android/gradlew

      - name: Assemble Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: armin-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30